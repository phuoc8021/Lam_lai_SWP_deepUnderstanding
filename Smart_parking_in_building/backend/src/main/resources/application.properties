# Cấu hình cổng chạy Server (Mặc định là 8080 đúng như OpenAPI Contract)
server.port=8080

# Cấu hình kết nối SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP_retake_cho_biet;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345

# Cấu hình Hibernate hiển thị câu lệnh SQL ra console để dễ debug
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect